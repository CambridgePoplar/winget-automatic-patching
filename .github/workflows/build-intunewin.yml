name: Build Intune Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download IntuneWinAppUtil
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/microsoft/Microsoft-Win32-Content-Prep-Tool/master/IntuneWinAppUtil.exe' -OutFile 'IntuneWinAppUtil.exe'

      - name: Package Intune app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'output' -Force | Out-Null
          .\IntuneWinAppUtil.exe -c .\Source -s Install.ps1 -o .\output -q

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinGetAutoPatch-intunewin
          path: output/*.intunewin

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.intunewin
